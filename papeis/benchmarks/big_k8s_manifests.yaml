apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-gateway-000
  namespace: production
  labels:
    app: service-gateway-000
    team: platform-engineering
    environment: production
    version: "2.4.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-gateway-000
  template:
    metadata:
      labels:
        app: service-gateway-000
        environment: production
    spec:
      containers:
      - name: service-gateway-000
        image: registry.corp.br/service-gateway-000:v2.4.1
        ports:
        - containerPort: 9090
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: url
        - name: REDIS_URL
          value: "redis://cache-cluster:6379/0"
        - name: LOG_LEVEL
          value: "info"
---

